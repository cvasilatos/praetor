site_name: raetor
theme:
  name: readthedocs
  color_mode: dark


nav:
  - Home: index.md
  - API Reference:
    - Praetor: api/praetord.md

plugins:
  - search
  - include-markdown
  - mkdocstrings:
        handlers:
          python:
            paths: ["src/praetor/"]

markdown_extensions:
  - admonition
